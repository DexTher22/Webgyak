<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meme Macskák Gyűjtemény</title>

    <link href="../style.css" rel="stylesheet">
    <link rel="stylesheet" href="../bootstrap.css">


</head>
<body class="catmemes-page page-wrapper">

    <div class="header">
        <h1 class="fw-bold">Cat memes</h1>

        <div style="
            width: 100%;
            background-color: #b71c1c; /* sötétebb piros */
            color: white;
            text-align: center;
            font-weight: bold;
            padding: 12px 0;
            margin-bottom: 20px;
        ">
            ⚠ FEJLESZTÉS ALATT ⚠
        </div>
        <p class="lead">Amúgy zseni ez a chatgpt</p>
    </div>

    <div class="container py-5">
        <div class="row g-4">

            <!-- Spinning Cat -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm h-100">
                    <img src="https://i.kym-cdn.com/entries/icons/original/000/042/808/cover1.jpg" class="card-img-top" alt="Spinning Cat">
                    <div class="card-body text-center">
                        <h5 class="card-title"> Spinning / OIIA Cat</h5>
                        <p class="card-text">Az ikonikus pörgő macska meme.</p>
                    </div>
                </div>
            </div>

            <!-- Popcat -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm h-100">
                    <div loop class="ratio ratio-16x9">
                        <iframe width="1278" height="548" src="https://www.youtube.com/embed/eD-d3S4YCKY" title="Pop Cat Meme ORIGINAL" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
                            
                        </iframe>
                    </div>
                    <div class="card-body text-center">
                        <h5 class="card-title"> Popcat</h5>
                        <p class="card-text">A tátogó „pap-pap” macska.</p>
                    </div>
                </div>
            </div>

            <!-- Confused Cat -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm h-100">
                    <iframe width="1143" height="535" src="https://www.youtube.com/embed/xVWeRnStdSA" title="Cat saying Huh!" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    <div class="card-body text-center">
                        <h5 class="card-title"> Értetlenkedő macska</h5>
                        <p class="card-text">Huh meme.</p>
                    </div>
                </div>
            </div>

            <!-- Black Cat -->
            <div class="col-md-6 col-lg-3">
                <div class="card shadow-sm h-100">
                    <img src="https://i.imgur.com/J5LVHEL.jpg" class="card-img-top" alt="Black Cat Meme">
                    <div class="card-body text-center">
                        <h5 class="card-title">🖤 Unott fekete macska</h5>
                        <p class="card-text">Az örök flegma tekintet.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

<footer class="text-center py-4 bg-light">
    <small>© 2026 Meme Macskák Weboldal</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
